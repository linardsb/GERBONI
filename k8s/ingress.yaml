apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gerboni-ingress
  namespace: gerboni
  labels:
    app.kubernetes.io/name: gerboni-ingress
    app.kubernetes.io/part-of: gerboni-platform
  annotations:
    # Nginx ingress controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # WebSocket support for AI chat
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"

    # TLS with cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Rate limiting at ingress level
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # Security headers (additional to application middleware)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Robots-Tag: noindex, nofollow";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.gerboni.lv
      secretName: gerboni-tls
  rules:
    - host: api.gerboni.lv
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gerboni-backend
                port:
                  name: http
---
# ClusterIssuer for Let's Encrypt (requires cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@gerboni.lv  # Update with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
