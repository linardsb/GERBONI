apiVersion: apps/v1
kind: Deployment
metadata:
  name: gerboni-backend
  namespace: gerboni
  labels:
    app.kubernetes.io/name: gerboni-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: gerboni-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gerboni-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gerboni-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: gerboni/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gerboni-config
            - secretRef:
                name: gerboni-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gerboni-backend
  namespace: gerboni
  labels:
    app.kubernetes.io/name: gerboni-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: gerboni-backend
