name: Feature Request
description: Suggest a new feature for GERBONI
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend / UI
        - Frontend / i18n
        - Backend / API
        - Backend / AI Agent
        - Backend / Payments
        - Infrastructure
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, or links to similar features
